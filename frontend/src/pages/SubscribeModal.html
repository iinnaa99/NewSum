<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴스 구독 신청</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }
        /* 커스텀 체크박스/라디오 버튼 스타일 */
        .custom-checkbox:checked {
            background-color: #3b82f6;
            border-color: #3b82f6;
        }
        .custom-radio:checked {
            background-color: #3b82f6;
            border-color: #3b82f6;
        }
        .custom-checkbox:checked::after, .custom-radio:checked::after {
            transform: scale(1);
        }
        /* 스크롤바 디자인 (선택 사항) */
        .form-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .form-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .form-scroll::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        .form-scroll::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-2xl mx-auto bg-white p-8 sm:p-10 rounded-xl shadow-lg aspect-[1/1] flex flex-col">
        <!-- 고정 헤더 -->
        <div class="flex-shrink-0">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">뉴스 구독 신청</h1>
            <p class="text-gray-600 mb-6">AI로 요약된 최신 뉴스를 원하는 시간에 받아보세요!</p>
        </div>

        <!-- 스크롤 가능한 폼 영역 -->
        <form id="subscription-form" class="flex-grow overflow-y-auto pr-4 form-scroll">
            <!-- 이름 -->
            <div class="mb-6">
                <label for="name" class="block text-lg font-medium text-gray-700 mb-2">이름<span class="text-red-500 ml-1">*</span></label>
                <input type="text" id="name" name="name" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200" placeholder="홍길동" required>
            </div>

            <!-- 이메일 -->
            <div class="mb-6">
                <label for="email" class="block text-lg font-medium text-gray-700 mb-2">이메일<span class="text-red-500 ml-1">*</span></label>
                <div class="flex flex-col sm:flex-row gap-4">
                    <input type="email" id="email" name="email" class="flex-grow px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200" placeholder="example@email.com" required>
                    <button type="button" class="w-full sm:w-auto px-6 py-3 bg-blue-500 text-white font-semibold rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-200">인증받기</button>
                </div>
            </div>

            <!-- 성별 -->
            <div class="mb-6">
                <label class="block text-lg font-medium text-gray-700 mb-2">성별</label>
                <div class="flex items-center gap-8">
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="gender" value="male" class="custom-radio appearance-none w-5 h-5 border-2 border-gray-300 rounded-full relative cursor-pointer checked:bg-blue-500 checked:border-blue-500 transition-all duration-200">
                        <span class="ml-3 text-gray-700">남성</span>
                    </label>
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="gender" value="female" class="custom-radio appearance-none w-5 h-5 border-2 border-gray-300 rounded-full relative cursor-pointer checked:bg-blue-500 checked:border-blue-500 transition-all duration-200">
                        <span class="ml-3 text-gray-700">여성</span>
                    </label>
                </div>
            </div>

            <!-- 나이 -->
            <div class="mb-8">
                <label for="age" class="block text-lg font-medium text-gray-700 mb-2">나이</label>
                <select id="age" name="age" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-200 bg-white">
                    <option value="">나이대를 선택하세요</option>
                    <option value="10">10대</option>
                    <option value="20">20대</option>
                    <option value="30">30대</option>
                    <option value="40">40대</option>
                    <option value="50">50대</option>
                    <option value="60">60대</option>
                    <option value="70">70대</option>
                    <option value="80">80대 이상</option>
                </select>
            </div>

            <!-- 받을 기사 -->
            <div class="mb-8">
                <label class="block text-lg font-medium text-gray-700 mb-2">받을 기사 (중복 선택 가능)<span class="text-red-500 ml-1">*</span></label>
                <div class="space-y-4">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" name="news_category" value="top10" class="custom-checkbox h-5 w-5 border-gray-300 rounded text-blue-600 focus:ring-blue-500">
                        <span class="ml-3 text-gray-700">TOP 10 뉴스</span>
                    </label>
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" name="news_category" value="breaking" class="custom-checkbox h-5 w-5 border-gray-300 rounded text-blue-600 focus:ring-blue-500">
                        <span class="ml-3 text-gray-700">긴급/재난 속보</span>
                    </label>
                    <div>
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" id="topic-main" name="news_category" value="topic" class="custom-checkbox h-5 w-5 border-gray-300 rounded text-blue-600 focus:ring-blue-500">
                            <span class="ml-3 text-gray-700 font-semibold">주제별 기사</span>
                        </label>
                        <div id="topic-details" class="mt-4 pl-8 border-l-2 border-gray-200 space-y-3 transition-opacity duration-300 opacity-50">
                            <label class="flex items-center cursor-pointer">
                                <input type="checkbox" class="topic-checkbox h-5 w-5 border-gray-300 rounded text-blue-600 focus:ring-blue-500" name="topic_detail" value="all" id="topic-all" disabled>
                                <span class="ml-3 text-gray-700">전체</span>
                            </label>
                            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                <label class="flex items-center cursor-pointer"><input type="checkbox" class="topic-checkbox topic-item h-5 w-5" name="topic_detail" value="politics" disabled><span class="ml-3">정치</span></label>
                                <label class="flex items-center cursor-pointer"><input type="checkbox" class="topic-checkbox topic-item h-5 w-5" name="topic_detail" value="economy" disabled><span class="ml-3">경제</span></label>
                                <label class="flex items-center cursor-pointer"><input type="checkbox" class="topic-checkbox topic-item h-5 w-5" name="topic_detail" value="society" disabled><span class="ml-3">사회</span></label>
                                <label class="flex items-center cursor-pointer"><input type="checkbox" class="topic-checkbox topic-item h-5 w-5" name="topic_detail" value="culture" disabled><span class="ml-3">문화</span></label>
                                <label class="flex items-center cursor-pointer"><input type="checkbox" class="topic-checkbox topic-item h-5 w-5" name="topic_detail" value="international" disabled><span class="ml-3">국제</span></label>
                                <label class="flex items-center cursor-pointer"><input type="checkbox" class="topic-checkbox topic-item h-5 w-5" name="topic_detail" value="local" disabled><span class="ml-3">지역</span></label>
                                <label class="flex items-center cursor-pointer"><input type="checkbox" class="topic-checkbox topic-item h-5 w-5" name="topic_detail" value="sports" disabled><span class="ml-3">스포츠</span></label>
                                <label class="flex items-center cursor-pointer"><input type="checkbox" class="topic-checkbox topic-item h-5 w-5" name="topic_detail" value="it" disabled><span class="ml-3">IT/과학</span></label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 신청 버튼 -->
            <div class="mt-10">
                <button type="submit" class="w-full px-6 py-4 bg-green-500 text-white text-lg font-bold rounded-lg hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition duration-200">신청하기</button>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const topicMainCheckbox = document.getElementById('topic-main');
            const topicDetailsContainer = document.getElementById('topic-details');
            const topicCheckboxes = document.querySelectorAll('.topic-checkbox');
            const topicAllCheckbox = document.getElementById('topic-all');
            const topicItemCheckboxes = document.querySelectorAll('.topic-item');
            const subscriptionForm = document.getElementById('subscription-form');

            // '주제별 기사' 메인 체크박스 클릭 이벤트
            topicMainCheckbox.addEventListener('change', function () {
                const isChecked = this.checked;
                
                topicCheckboxes.forEach(checkbox => {
                    checkbox.disabled = !isChecked;
                });

                if (isChecked) {
                    topicDetailsContainer.classList.remove('opacity-50');
                } else {
                    topicDetailsContainer.classList.add('opacity-50');
                    topicCheckboxes.forEach(checkbox => {
                        checkbox.checked = false;
                    });
                }
            });

            // '전체' 체크박스 클릭 이벤트
            topicAllCheckbox.addEventListener('change', function() {
                const isChecked = this.checked;
                topicItemCheckboxes.forEach(checkbox => {
                    checkbox.checked = isChecked;
                });
            });

            // 개별 주제 체크박스 클릭 이벤트
            topicItemCheckboxes.forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const allChecked = Array.from(topicItemCheckboxes).every(item => item.checked);
                    topicAllCheckbox.checked = allChecked;
                });
            });
            
            // 폼 제출 이벤트
            subscriptionForm.addEventListener('submit', function(event) {
                event.preventDefault(); // 기본 제출 동작 방지

                // 필수 항목 유효성 검사
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const newsCategories = document.querySelectorAll('input[name="news_category"]:checked, input[name="topic_detail"]:checked');
                
                let categoryCheckedCount = 0;
                newsCategories.forEach(checkbox => {
                    if (checkbox.id !== 'topic-main' || (checkbox.id === 'topic-main' && document.querySelector('input[name="topic_detail"]:checked'))) {
                        categoryCheckedCount++;
                    }
                });

                let errorMessages = [];
                if (name === '') {
                    errorMessages.push('이름을 입력해주세요.');
                }
                if (email === '') {
                    errorMessages.push('이메일을 입력해주세요.');
                }
                if (categoryCheckedCount === 0) {
                     errorMessages.push('받을 기사를 1개 이상 선택해주세요.');
                }

                if (errorMessages.length > 0) {
                    alert('다음 항목을 확인해주세요:\n\n- ' + errorMessages.join('\n- '));
                } else {
                    alert('구독 신청이 완료되었습니다! (실제 데이터는 전송되지 않습니다)');
                    subscriptionForm.reset();
                    topicDetailsContainer.classList.add('opacity-50');
                    topicCheckboxes.forEach(checkbox => {
                        checkbox.disabled = true;
                    });
                }
            });
        });
    </script>
</body>
</html>
